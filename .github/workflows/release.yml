name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: rundeck-aarch64-apple-darwin.tar.gz

          - os: macos-13
            target: x86_64-apple-darwin
            archive: rundeck-x86_64-apple-darwin.tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: rundeck-x86_64-unknown-linux-gnu.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rundeck dist/rundeck
          cp README.md LICENSE dist/
          tar -czf ${{ matrix.archive }} -C dist rundeck README.md LICENSE
          shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
